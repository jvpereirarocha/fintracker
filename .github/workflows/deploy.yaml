name: CI/CD - Fintracker

on:
  push:
    branches: [main]

env:
  DOCKER_IMAGE: jvrochadev/fintracker
  DEPLOYMENT_NAME: fintracker-deployment
  NAMESPACE: fintracker-dev
  CONTAINER_NAME: fintracker-web

jobs:
  test:
    runs-on: self-hosted
    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installing dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Running tests
        run: |
          pytest --tb=short -q

  versioning:
    runs-on: self-hosted
    needs: test
    concurrency:
      group: release-${{ github.ref_name }}
      cancel-in-progress: false
    permissions:
      contents: write
      id-token: write
    outputs:
      released: ${{ steps.semrel.outputs.released }}
      version: ${{ steps.semrel.outputs.version }}
      tag: ${{ steps.semrel.outputs.tag }}
    steps:
      - name: Code checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Python Semantic Release
        id: semrel
        uses: python-semantic-release/python-semantic-release@v10.5.3
        with:
          github_token: ${{ secrets.RELEASE_TOKEN }}
          verbosity: "2"
          git_committer_name: "github-actions"
          git_committer_email: "actions@users.noreply.github.com"

  build-and-push:
    runs-on: self-hosted
    needs: versioning
    if: needs.versioning.outputs.released == 'true'
    outputs:
      image_tag: ${{ needs.versioning.outputs.version }}
    steps:
      - name: Code checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.versioning.outputs.tag }}

      - name: Docker Hub authentication
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ needs.versioning.outputs.version }}
            ${{ env.DOCKER_IMAGE }}:latest

  deploy:
    runs-on: self-hosted
    needs: [versioning, build-and-push]
    if: needs.versioning.outputs.released == 'true'
    steps:
      - name: Update deployment image on Kubernetes cluster
        run: |
          kubectl set image deployment/${{ env.DEPLOYMENT_NAME }} \
            ${{ env.CONTAINER_NAME }}=${{ env.DOCKER_IMAGE }}:${{ needs.versioning.outputs.version }} \
            -n ${{ env.NAMESPACE }}

      - name: Waiting rollout
        run: |
          kubectl rollout status deployment/${{ env.DEPLOYMENT_NAME }} \
            -n ${{ env.NAMESPACE }} \
            --timeout=120s

      - name: Confirm deployed version
        run: |
          echo "✅ Fintracker v${{ needs.versioning.outputs.version }} deployed successfully on Kubernetes cluster!"
