apiVersion: v1
kind: Service
metadata:
  name: fintracker-svc
  namespace: fintracker-dev
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/metrics"
    prometheus.io/port: "8000"
spec:
  type: NodePort
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30001
  selector:
    app: fintracker
