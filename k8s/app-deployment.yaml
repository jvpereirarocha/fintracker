apiVersion: apps/v1
kind: Deployment
metadata:
  name: fintracker
  namespace: fintracker-dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fintracker
  template:
    metadata:
      labels:
        app: fintracker
    spec:
      containers:
        - name: fintracker-web
          image: jvrochadev/fintracker:2.0
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: fintracker-configmap
            - secretRef:
                name: fintracker-secrets
