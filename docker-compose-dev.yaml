services:
  web:
    container_name: fintracker-api
    build:
      context: .
    volumes:
      - .:/app
    ports:
      - 8008:8000
    networks:
      - fintracker-network
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
        restart: true
  db:
    image: postgres:15-alpine
    container_name: dbfintracker
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - 5433:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      start_period: 5s
      timeout: 3s
      retries: 3
    networks:
      - fintracker-network
    env_file:
      - .env
  prometheus:
    image: prom/prometheus
    container_name: prometheus-fintracker
    volumes:
      - ./observability/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yaml
    command: --config.file=/etc/prometheus/prometheus.yaml
    ports:
      - 9090:9090
    networks:
      - fintracker-network
  grafana:
    image: grafana/grafana
    container_name: grafana-fintracker
    ports:
      - 3005:3000
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - fintracker-network

volumes:
  prometheus_data:
    driver: local
    driver_opts:
      type: none
      device: ./observability/prometheus
      o: bind
  grafana_data:
  postgres_data:

networks:
  fintracker-network:
    name: netfintracker
    driver: bridge
